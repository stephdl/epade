name: Release (tag sémantique)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Installer les dépendances
        run: pip install pyinstaller fpdf2 tkcalendar

      - name: Injecter la version
        run: Set-Content version.py "__version__ = '${{ github.ref_name }}'"

      - name: Construire l'exe
        run: |
          pyinstaller --onefile --windowed --name EPADE `
            --add-data "assets/fonts;assets/fonts" `
            --icon "assets/epade.ico" `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: EPADE-windows
          path: dist/EPADE.exe

  build-linux:
    runs-on: ubuntu-latest
    container: rockylinux/rockylinux:9
    steps:
      - name: Installer git et outils
        run: dnf install -y git file

      - uses: actions/checkout@v6

      - name: Installer Python 3.12 et tkinter
        run: dnf install -y python3.12 python3.12-pip python3.12-tkinter

      - name: Installer les dépendances Python
        run: python3.12 -m pip install --upgrade pip && python3.12 -m pip install pyinstaller fpdf2 tkcalendar

      - name: Injecter la version
        run: echo "__version__ = '${{ github.ref_name }}'" > version.py

      - name: Construire le binaire
        run: |
          python3.12 -m PyInstaller --onefile --windowed --name EPADE \
            --add-data "assets/fonts:assets/fonts" \
            --icon "assets/epade.ico" \
            main.py

      - name: Préparer l'AppDir
        run: |
          mkdir -p EPADE.AppDir/usr/bin
          cp dist/EPADE EPADE.AppDir/usr/bin/EPADE
          cp assets/epade.png EPADE.AppDir/epade.png
          cp assets/epade.png EPADE.AppDir/.DirIcon
          printf '[Desktop Entry]\nName=EPADE\nExec=EPADE\nIcon=epade\nType=Application\nCategories=Science;Education;X-Medical;\n' \
            > EPADE.AppDir/epade.desktop
          printf '#!/bin/sh\nexec "$APPDIR/usr/bin/EPADE" "$@"\n' > EPADE.AppDir/AppRun
          chmod +x EPADE.AppDir/AppRun EPADE.AppDir/usr/bin/EPADE

      - name: Télécharger appimagetool
        run: |
          curl -Lo appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Construire l'AppImage
        run: |
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run \
            EPADE.AppDir EPADE-linux-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: EPADE-linux
          path: EPADE-linux-x86_64.AppImage

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Télécharger les artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Renommer les binaires
        run: |
          mv dist/EPADE-windows/EPADE.exe dist/EPADE.exe
          mv dist/EPADE-linux/EPADE-linux-x86_64.AppImage dist/EPADE-linux-x86_64.AppImage
          chmod +x dist/EPADE-linux-x86_64.AppImage

      - name: Créer la release GitHub
        uses: softprops/action-gh-release@v3
        with:
          name: "ÉPADE ${{ github.ref_name }}"
          body: |
            ## ÉPADE ${{ github.ref_name }}

            ### Installation Windows
            1. Télécharger `EPADE.exe`
            2. Double-cliquer pour lancer — aucune installation requise
            3. La base de données `data\epade.db` est créée automatiquement à côté de l'exe

            ### Installation Linux (AppImage)
            1. Télécharger `EPADE-linux-x86_64.AppImage`
            2. Le rendre exécutable : `chmod +x EPADE-linux-x86_64.AppImage`
            3. Lancer : `./EPADE-linux-x86_64.AppImage`
            4. La base de données `data/epade.db` est créée automatiquement à côté du fichier
            5. L'icône apparaît automatiquement dans les gestionnaires de fichiers compatibles AppImage

            ### Installation Linux (depuis les sources) / macOS
            Voir [README.md](https://github.com/${{ github.repository }}/blob/master/README.md)
          generate_release_notes: true
          files: |
            dist/EPADE.exe
            dist/EPADE-linux-x86_64.AppImage
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
