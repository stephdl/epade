name: Sécurité

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # chaque lundi à 6h

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Initialiser CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Analyse CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  bandit:
    name: Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Installer Bandit
        run: pip install bandit

      - name: Analyser avec Bandit
        run: bandit -r . -x ./tests -ll

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install fpdf2 tkcalendar pyinstaller pip-audit

      - name: Auditer les dépendances
        run: pip-audit
