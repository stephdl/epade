name: Build (branches)

on:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - "**.md"
      - ".gitignore"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install pyinstaller fpdf2 tkcalendar

      - name: Injecter la version
        run: |
          $ver = "${{ github.ref_name }}-${{ github.sha }}".Substring(0, [Math]::Min(30, "${{ github.ref_name }}-${{ github.sha }}".Length))
          Set-Content version.py "__version__ = '$ver'"

      - name: Construire l'exe
        run: |
          pyinstaller --onefile --windowed --name EPADE `
            --add-data "assets/fonts;assets/fonts" `
            --icon "assets/epade.ico" `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EPADE-windows-${{ github.sha }}
          path: dist/EPADE.exe
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer tkinter
        run: sudo apt-get install -y python3-tk

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install pyinstaller fpdf2 tkcalendar

      - name: Injecter la version
        run: |
          ver="${{ github.ref_name }}-${{ github.sha }}"
          echo "__version__ = '${ver:0:30}'" > version.py

      - name: Construire le binaire
        run: |
          pyinstaller --onefile --windowed --name EPADE \
            --add-data "assets/fonts:assets/fonts" \
            --icon "assets/epade.ico" \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EPADE-linux-${{ github.sha }}
          path: dist/EPADE
          retention-days: 30
