name: Build (branches)

on:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - "**.md"
      - ".gitignore"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install pyinstaller fpdf2 tkcalendar

      - name: Injecter la version
        run: |
          $ver = "${{ github.ref_name }}-${{ github.sha }}".Substring(0, [Math]::Min(30, "${{ github.ref_name }}-${{ github.sha }}".Length))
          Set-Content version.py "__version__ = '$ver'"

      - name: Construire l'exe
        run: |
          pyinstaller --onefile --windowed --name EPADE `
            --add-data "assets/fonts;assets/fonts" `
            --icon "assets/epade.ico" `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: EPADE-windows-${{ github.sha }}
          path: dist/EPADE.exe
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    container: rockylinux/rockylinux:9
    steps:
      - name: Installer git
        run: dnf install -y git

      - uses: actions/checkout@v6

      - name: Installer Python 3.12 et tkinter
        run: dnf install -y python3.12 python3.12-pip python3.12-tkinter

      - name: Installer les dépendances Python
        run: python3.12 -m pip install --upgrade pip && python3.12 -m pip install pyinstaller fpdf2 tkcalendar

      - name: Injecter la version
        run: |
          ver="${{ github.ref_name }}-${{ github.sha }}"
          echo "__version__ = '${ver:0:30}'" > version.py

      - name: Construire le binaire
        run: |
          python3.12 -m PyInstaller --onefile --windowed --name EPADE \
            --add-data "assets/fonts:assets/fonts" \
            --icon "assets/epade.ico" \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: EPADE-linux-${{ github.sha }}
          path: dist/EPADE
          retention-days: 30
